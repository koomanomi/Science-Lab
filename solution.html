<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>水溶液じっけんラボ</title>
<style>
  :root {
    --bg: #1a1d24;
    --panel: #252932;
    --ink: #e8eaed;
    --line: #3a3f4b;
    --accent: #5b9bd5;
    --accent-ink: #fff;
    --muted: #9aa3b2;
    --shelf: #2f343f;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    font-family: "Hiragino Maru Gothic ProN", "Yu Gothic", system-ui, sans-serif;
    background: var(--bg);
    color: var(--ink);
    line-height: 1.6;
    display: flex;
    flex-direction: column;
  }
  header {
    display: flex; align-items: center; gap: 12px;
    padding: 16px; background: var(--panel);
    border-bottom: 1px solid var(--line); flex-shrink: 0;
  }
  .back-btn {
    background: var(--shelf); border: 1px solid var(--line);
    border-radius: 10px; width: 40px; height: 40px;
    cursor: pointer; font-size: 1.2rem; color: var(--ink);
    transition: all 0.15s ease; flex-shrink: 0;
  }
  .back-btn:hover { background: var(--accent); color: #fff; }
  header h1 { font-size: 1.4rem; letter-spacing: 0.04em; flex: 1; }
  .sub { color: var(--muted); font-size: 0.75rem; }

  .beaker-section {
    flex-shrink: 0; background: #0e1013;
    border-bottom: 1px solid var(--line); padding: 16px 8px;
    display: flex; flex-direction: column; align-items: center;
  }

  /* ビーカーと試験管を横に並べる */
  .apparatus-row {
    display: flex;
    align-items: flex-end;
    justify-content: center;
    gap: 6px;
    width: 100%;
  }

  .control-section { flex: 1; overflow-y: auto; padding: 16px; }

  /* ===== ビーカー（反応元） ===== */
  .beaker-area { position: relative; width: 120px; height: 170px; flex-shrink: 0; }
  .beaker {
    position: absolute; bottom: 0; left: 0;
    width: 120px; height: 130px;
    border: 3px solid rgba(255,255,255,0.45);
    border-top: none; border-radius: 0 0 16px 16px;
    overflow: hidden; background: rgba(255,255,255,0.04);
    transition: all 0.3s ease;
  }
  .beaker.broken { opacity: 0; transform: scale(0.8); animation: breakGlass 0.4s ease-out; }
  @keyframes breakGlass {
    0% { opacity: 1; transform: scale(1) rotate(0deg); }
    50% { transform: scale(1.1) rotate(2deg); }
    100% { opacity: 0; transform: scale(0.6) rotate(-5deg); }
  }
  .liquid {
    position: absolute; bottom: 0; left: 0; right: 0;
    height: 0%; background: rgba(220, 235, 245, 0.12);
    transition: background 0.5s ease, height 0.5s ease;
  }
  .liquid.filled { height: 58%; }
  .liquid.cloudy { background: rgba(245, 245, 245, 0.78) !important; }
  .liquid::before {
    content: ""; position: absolute; top: -5px; left: 0; right: 0;
    height: 8px; border-radius: 50%; background: rgba(255,255,255,0.25);
    animation: wave 2.5s ease-in-out infinite;
  }
  @keyframes wave {
    0%, 100% { transform: translateX(0) scaleX(1); }
    50% { transform: translateX(2px) scaleX(1.05); }
  }
  .solids-display {
    position: absolute; bottom: 6px; left: 6px; right: 6px;
    display: flex; gap: 3px; flex-wrap: wrap;
    align-content: flex-end; justify-content: center; z-index: 2;
  }
  .solid-item {
    width: 22px; height: 22px;
    transition: opacity 1.5s ease, transform 1.5s ease;
  }
  .solid-item.dissolving { opacity: 0; transform: scale(0.3); }

  .bubbles {
    position: absolute; top: 12%; left: 0; width: 100%;
    height: 50%; pointer-events: none; z-index: 3;
  }
  .bubble {
    position: absolute; width: 3px; height: 3px; border-radius: 50%;
    background: rgba(255,255,255,0.7); animation: rise 2s ease-in infinite;
  }
  @keyframes rise {
    0% { opacity: 1; transform: translateY(0px); }
    100% { opacity: 0; transform: translateY(-75px); }
  }
  .bubble:nth-child(1) { left: 15%; animation-delay: 0s; }
  .bubble:nth-child(2) { left: 25%; animation-delay: 0.2s; }
  .bubble:nth-child(3) { left: 35%; animation-delay: 0.4s; }
  .bubble:nth-child(4) { left: 45%; animation-delay: 0.1s; }
  .bubble:nth-child(5) { left: 55%; animation-delay: 0.3s; }
  .bubble:nth-child(6) { left: 65%; animation-delay: 0.5s; }
  .bubble:nth-child(7) { left: 75%; animation-delay: 0.15s; }
  .bubble:nth-child(8) { left: 85%; animation-delay: 0.35s; }

  .explosion {
    position: absolute; bottom: 50px; left: 50%;
    transform: translateX(-50%); width: 90px; height: 90px;
    background: radial-gradient(circle, #ffff00 0%, #ff8800 40%, #ff0000 70%, transparent 100%);
    border-radius: 50%; opacity: 0; pointer-events: none; z-index: 6;
  }
  .explosion.active { animation: explode 0.6s ease-out; }
  @keyframes explode {
    0% { opacity: 1; transform: translateX(-50%) scale(0.3); }
    100% { opacity: 0; transform: translateX(-50%) scale(1.8); }
  }
  .testtube.broken { animation: breakGlass 0.4s ease-out forwards; }

  .paper {
    position: absolute; top: 6px; right: -6px;
    width: 16px; height: 55px; border-radius: 2px;
    background: #fff; border: 1px solid var(--line);
    transition: background 0.5s ease; display: none; z-index: 3;
  }
  .paper.show { display: block; }

  /* ===== ガラス管（ビーカー→試験管） ===== */
  .tube-connector {
    width: 30px;
    height: 4px;
    background: rgba(255,255,255,0.25);
    border-radius: 2px;
    margin-bottom: 60px;
    flex-shrink: 0;
    position: relative;
    overflow: hidden;
  }
  .tube-connector .flow {
    position: absolute; top: 0; left: -20px;
    width: 12px; height: 4px; border-radius: 2px;
    background: rgba(255,255,255,0.8);
    opacity: 0;
  }
  .tube-connector.active .flow {
    animation: flowGas 1s linear infinite;
  }
  @keyframes flowGas {
    0% { opacity: 0; left: -20px; }
    20% { opacity: 1; }
    80% { opacity: 1; }
    100% { opacity: 0; left: 40px; }
  }

  /* ===== 試験管（確認用） ===== */
  .testtube-area {
    position: relative; width: 60px; height: 170px; flex-shrink: 0;
    opacity: 0.35; transition: opacity 0.4s ease;
  }
  .testtube-area.has-gas { opacity: 1; }
  .testtube {
    position: absolute; bottom: 0; left: 50%;
    transform: translateX(-50%);
    width: 36px; height: 110px;
    border: 3px solid rgba(255,255,255,0.4);
    border-top: none;
    border-radius: 0 0 16px 16px;
    overflow: hidden;
    background: rgba(255,255,255,0.03);
  }
  .testtube-cap {
    position: absolute; bottom: 110px; left: 50%;
    transform: translateX(-50%);
    width: 40px; height: 6px;
    border: 3px solid rgba(255,255,255,0.4);
    border-bottom: none;
    border-radius: 4px 4px 0 0;
  }
  .gas-fill {
    position: absolute; bottom: 0; left: 0; right: 0;
    height: 0%;
    transition: height 0.5s ease, background 0.4s ease;
  }
  .gas-fill.filled { height: 85%; }
  .limewater-fill {
    position: absolute; bottom: 0; left: 0; right: 0;
    height: 0%; background: rgba(220, 235, 245, 0.15);
    transition: height 0.4s ease, background 0.5s ease;
  }
  .limewater-fill.show { height: 30%; }
  .limewater-fill.cloudy { background: rgba(245,245,245,0.85) !important; }

  .tube-flame {
    position: absolute; bottom: 116px; left: 50%;
    transform: translateX(-50%);
    width: 14px; height: 20px;
    background: radial-gradient(ellipse at center bottom, #ffcc00 0%, #ff6b00 45%, #ff2200 70%, transparent 80%);
    border-radius: 50% 50% 50% 50% / 65% 65% 35% 35%;
    opacity: 0; pointer-events: none; z-index: 4;
  }
  .tube-flame.burn { opacity: 1; animation: flameFlicker 0.12s infinite; }
  .tube-flame.burn-big {
    opacity: 1; width: 34px; height: 56px;
    animation: flameFlickerBig 0.08s infinite;
  }
  @keyframes flameFlicker {
    0%, 100% { transform: translateX(-50%) scaleY(0.9) scaleX(0.95); }
    50% { transform: translateX(-50%) scaleY(1.15) scaleX(1.05); }
  }
  @keyframes flameFlickerBig {
    0%, 100% { transform: translateX(-50%) scaleY(0.92) scaleX(0.95); }
    50% { transform: translateX(-50%) scaleY(1.2) scaleX(1.08); }
  }
  .tube-extinguish {
    position: absolute; bottom: 120px; left: 50%;
    transform: translateX(-50%); font-size: 0.65rem;
    color: #ccc; opacity: 0; pointer-events: none; white-space: nowrap;
  }
  .tube-extinguish.show { animation: fadeInOut 1.2s ease-in-out; }
  @keyframes fadeInOut {
    0% { opacity: 0; } 20% { opacity: 1; } 80% { opacity: 1; } 100% { opacity: 0; }
  }
  .testtube-label {
    margin-top: 6px; font-size: 0.6rem; color: var(--muted); text-align: center;
  }

  .info { margin-top: 10px; text-align: center; }
  .label { font-weight: 700; font-size: 0.9rem; min-height: 1.6em; }
  .ph { margin-top: 2px; font-size: 0.7rem; color: var(--muted); min-height: 1.4em; }
  .recipe { margin-top: 6px; font-size: 0.7rem; color: var(--muted); min-height: 2em; }
  .gas-produced { margin-top: 3px; font-size: 0.75rem; color: #4ade80; font-weight: 600; }
  .reaction {
    margin-top: 6px; font-size: 0.65rem; color: var(--accent);
    min-height: 2em; font-weight: 600;
    background: rgba(91, 155, 213, 0.12); padding: 4px; border-radius: 8px;
  }
  .smell { margin-top: 3px; font-size: 0.7rem; color: #fbbf24; }

  .panel {
    background: var(--panel); border: 1px solid var(--line);
    border-radius: 12px; padding: 12px; margin-bottom: 12px;
  }
  .panel h2 {
    font-size: 0.85rem; color: var(--muted); margin-bottom: 8px;
    letter-spacing: 0.05em; font-weight: 700;
  }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
  .grid.single { grid-template-columns: 1fr; }
  .grid.three { grid-template-columns: 1fr 1fr 1fr; }
  button {
    font-family: inherit; font-size: 0.82rem; cursor: pointer;
    border: 1px solid var(--line); background: var(--shelf);
    color: var(--ink); border-radius: 8px; padding: 7px 5px;
    transition: all 0.15s ease; font-weight: 600;
  }
  button:hover { border-color: var(--accent); }
  button.active { background: var(--accent); color: var(--accent-ink); border-color: var(--accent); }
  button:disabled { opacity: 0.4; cursor: not-allowed; }
  .checkbox-btn {
    display: flex; align-items: center; gap: 5px;
    justify-content: flex-start; font-size: 0.8rem; color: var(--ink);
  }
  .checkbox-btn input { width: 13px; height: 13px; cursor: pointer; flex-shrink: 0; }

  .collect-btn {
    width: 100%; background: #2563eb; color: #fff;
    padding: 8px; margin-top: 10px; border-color: #1d4ed8; font-size: 0.85rem;
  }
  .collect-btn:hover { background: #1d4ed8; }
  .collect-btn:disabled { background: #555; }

  .tube-actions {
    display: flex; gap: 8px; margin-top: 10px;
  }
  .tube-actions button {
    flex: 1; font-size: 0.78rem; padding: 8px 4px;
  }
  .match-btn { background: #f59e0b; color: #fff; border-color: #d97706; }
  .match-btn:hover { background: #d97706; }
  .limewater-btn { background: #16a34a; color: #fff; border-color: #15803d; }
  .limewater-btn:hover { background: #15803d; }

  .reset {
    width: 100%; background: transparent; border: 1px dashed var(--line);
    color: var(--muted); padding: 6px; margin-top: 10px; font-size: 0.8rem;
  }
  .hint {
    margin-top: 10px; font-size: 0.7rem; color: var(--muted);
    background: var(--shelf); border-radius: 8px; padding: 6px 8px; line-height: 1.4;
  }
</style>
</head>
<body>
<header>
  <button class="back-btn" onclick="history.back()">←</button>
  <div>
    <h1>水溶液じっけんラボ</h1>
    <p class="sub">液体・固体・気体を組み合わせて、水溶液を作ろう</p>
  </div>
</header>

<div class="beaker-section">
  <div class="apparatus-row">
    <!-- ビーカー（反応元） -->
    <div class="beaker-area">
      <div class="beaker" id="beaker">
        <div class="liquid" id="liquid">
          <div class="solids-display" id="solidsDisplay"></div>
          <div class="bubbles" id="bubbles"></div>
        </div>
      </div>
      <div class="paper" id="paper"></div>
    </div>

    <!-- ガラス管 -->
    <div class="tube-connector" id="tubeConnector">
      <div class="flow"></div>
    </div>

    <!-- 試験管（確認用） -->
    <div class="testtube-area" id="testtubeArea">
      <div class="testtube-cap"></div>
      <div class="testtube" id="testtube">
        <div class="gas-fill" id="gasFill"></div>
        <div class="limewater-fill" id="limewaterFill"></div>
      </div>
      <div class="tube-flame" id="tubeFlame"></div>
      <div class="explosion" id="explosion"></div>
      <div class="tube-extinguish" id="tubeExtinguish">シュー…</div>
      <div class="testtube-label" id="testtubeLabel">気体なし</div>
    </div>
  </div>

  <div class="info">
    <div class="label" id="label">ビーカーが空です</div>
    <div class="ph" id="phinfo"></div>
    <div class="recipe" id="recipe"></div>
    <div class="gas-produced" id="gasProd"></div>
    <div class="reaction" id="reaction"></div>
    <div class="smell" id="smell"></div>
  </div>
</div>

<div class="control-section">
  <div class="panel">
    <h2>① 液体をえらぶ</h2>
    <div class="grid single" id="liquids"></div>
  </div>
  <div class="panel">
    <h2>② 固体を追加（複数可）</h2>
    <div class="grid" id="solids"></div>
  </div>

  <button class="collect-btn" id="collectBtn" onclick="collectGas()" disabled>発生した気体を試験管に集める</button>

  <div class="panel">
    <h2>③ 試験管の気体を調べる</h2>
    <div class="tube-actions" id="tubeActions" style="display:none;">
      <button class="match-btn" onclick="testCombustion()">マッチで火をつける</button>
      <button class="limewater-btn" onclick="testLimewater()">石灰水に通す</button>
    </div>
    <p id="tubeHint" style="font-size:0.7rem;color:var(--muted);margin:0;">気体が発生したら、上のボタンで集めてね。</p>
  </div>

  <div class="panel">
    <h2>④ 指示薬を入れる（ビーカーへ）</h2>
    <div class="grid three" id="indicators"></div>
  </div>

  <button class="reset" id="reset">すべてリセット</button>
  <div class="hint" id="hint">まず液体をえらんでね。</div>
</div>

<script>
  const SVG = {
    salt: `<svg viewBox="0 0 40 40"><rect x="10" y="10" width="20" height="20" rx="2" fill="#f5f5f5" stroke="#ccc"/><rect x="14" y="14" width="6" height="6" fill="#fff" opacity="0.8"/></svg>`,
    sugar: `<svg viewBox="0 0 40 40"><circle cx="14" cy="22" r="5" fill="#fff8e8"/><circle cx="24" cy="18" r="5" fill="#fffdf2"/><circle cx="20" cy="28" r="4" fill="#fff5e0"/></svg>`,
    limestone: `<svg viewBox="0 0 40 40"><polygon points="8,28 14,12 26,10 34,22 30,32 14,34" fill="#d4c8b0" stroke="#a89878" stroke-width="1"/><polygon points="14,12 26,10 22,18" fill="#e0d6c0"/></svg>`,
    calcium_hydroxide: `<svg viewBox="0 0 40 40"><circle cx="13" cy="24" r="5" fill="#f5f5f5"/><circle cx="23" cy="20" r="5" fill="#fafafa"/><circle cx="19" cy="29" r="4" fill="#eee"/></svg>`,
    sodium_hydroxide: `<svg viewBox="0 0 40 40"><rect x="12" y="16" width="7" height="7" rx="1" fill="#fffce0"/><rect x="21" y="20" width="6" height="6" rx="1" fill="#fffae0"/><rect x="16" y="24" width="6" height="6" rx="1" fill="#fff8d8"/></svg>`,
    manganese_dioxide: `<svg viewBox="0 0 40 40"><circle cx="13" cy="24" r="4" fill="#2a2a2a"/><circle cx="22" cy="20" r="4" fill="#1a1a1a"/><circle cx="18" cy="28" r="3.5" fill="#333"/><circle cx="27" cy="26" r="3" fill="#222"/></svg>`,
    iron: `<svg viewBox="0 0 40 40"><rect x="8" y="18" width="24" height="5" rx="1" fill="#8a9199" transform="rotate(-15 20 20)"/><rect x="8" y="18" width="24" height="2" rx="1" fill="#b0b8c0" transform="rotate(-15 20 20)"/></svg>`,
    aluminum: `<svg viewBox="0 0 40 40"><polygon points="10,16 30,12 32,24 12,28" fill="#c4c8cc"/><polygon points="10,16 30,12 28,18 12,20" fill="#e0e4e8"/></svg>`,
    carbon: `<svg viewBox="0 0 40 40"><circle cx="14" cy="24" r="4" fill="#111"/><circle cx="23" cy="21" r="4" fill="#1a1a1a"/><circle cx="19" cy="29" r="3.5" fill="#0a0a0a"/></svg>`,
    copper: `<svg viewBox="0 0 40 40"><polygon points="10,22 16,14 28,16 30,26 18,30" fill="#b87333" stroke="#8a561f" stroke-width="1"/><polygon points="16,14 28,16 22,20" fill="#d4915c"/></svg>`,
    copper_oxide: `<svg viewBox="0 0 40 40"><circle cx="14" cy="24" r="4" fill="#0d3d22"/><circle cx="23" cy="21" r="4" fill="#0a3019"/><circle cx="19" cy="29" r="3.5" fill="#114d2b"/></svg>`,
    sulfur: `<svg viewBox="0 0 40 40"><circle cx="13" cy="25" r="4.5" fill="#e3c33b"/><circle cx="23" cy="22" r="4.5" fill="#ecd14a"/><circle cx="18" cy="29" r="4" fill="#d8b82e"/><circle cx="27" cy="27" r="3.5" fill="#e3c33b"/></svg>`
  };

  const LIQUIDS = {
    "水": { property: "neutral", smell: "" },
    "希塩酸": { property: "acid", smell: "つんとくるにおい" },
    "希硫酸": { property: "acid", smell: "" },
    "お酢": { property: "acid", smell: "すっぱいにおい" },
    "過酸化水素水": { property: "neutral", smell: "" }
  };

  const SOLIDS = {
    "食塩": { property: "neutral", svg: "salt", soluble: true },
    "砂糖": { property: "neutral", svg: "sugar", soluble: true },
    "石灰石": { property: "acid_react", svg: "limestone", soluble: false },
    "水酸化カルシウム": { property: "base", svg: "calcium_hydroxide", soluble: true },
    "水酸化ナトリウム": { property: "base", svg: "sodium_hydroxide", soluble: true },
    "二酸化マンガン": { property: "neutral", svg: "manganese_dioxide", soluble: false },
    "鉄": { property: "acid_react", svg: "iron", soluble: false },
    "アルミニウム": { property: "acid_react", svg: "aluminum", soluble: false },
    "炭素": { property: "neutral", svg: "carbon", soluble: false },
    "銅": { property: "neutral", svg: "copper", soluble: false },
    "酸化銅": { property: "neutral", svg: "copper_oxide", soluble: false },
    "硫黄": { property: "neutral", svg: "sulfur", soluble: false }
  };

  const GASES = {
    "酸素": { property: "neutral", smell: "", combustible: "oxygen", color: "rgba(180,220,255,0.08)" },
    "二酸化炭素": { property: "acid", smell: "においはない", combustible: "co2", color: "rgba(200,200,200,0.1)" },
    "塩化水素": { property: "acid", smell: "つんとくるにおい", combustible: "none", color: "rgba(255,240,200,0.12)" },
    "アンモニア": { property: "base", smell: "つんとくるにおい（独特）", combustible: "none", color: "rgba(220,255,220,0.1)" },
    "水素": { property: "neutral", smell: "においはない", combustible: "hydrogen", color: "rgba(220,220,255,0.08)" }
  };

  const INDICATORS = {
    "BTB液": {
      colors: { acid: "rgba(245, 215, 110, 0.85)", neutral: "rgba(126, 200, 80, 0.85)", base: "rgba(59, 127, 212, 0.85)" },
      desc: { acid: "黄色", neutral: "緑色", base: "青色" }
    },
    "フェノールフタレイン": {
      colors: { acid: "rgba(220, 235, 245, 0.12)", neutral: "rgba(220, 235, 245, 0.12)", base: "rgba(232, 90, 155, 0.85)" },
      desc: { acid: "むしょく", neutral: "むしょく", base: "赤むらさき色" }
    },
    "リトマス紙": {
      colors: { acid: "#e8554e", neutral: "#cdb9a0", base: "#4a78c4" },
      desc: { acid: "赤", neutral: "変わらない", base: "青" }
    }
  };

  const REACTIONS = {
    "希塩酸+鉄": { formula: "2HCl + Fe → FeCl₂ + H₂↑", bubbles: true, gas: "水素（H₂）", gasKey: "水素", smell: "", combustible: "hydrogen" },
    "希塩酸+アルミニウム": { formula: "6HCl + 2Al → 2AlCl₃ + 3H₂↑", bubbles: true, gas: "水素（H₂）", gasKey: "水素", smell: "", combustible: "hydrogen" },
    "希硫酸+鉄": { formula: "H₂SO₄ + Fe → FeSO₄ + H₂↑", bubbles: true, gas: "水素（H₂）", gasKey: "水素", smell: "", combustible: "hydrogen" },
    "希硫酸+アルミニウム": { formula: "3H₂SO₄ + 2Al → Al₂(SO₄)₃ + 3H₂↑", bubbles: true, gas: "水素（H₂）", gasKey: "水素", smell: "", combustible: "hydrogen" },
    "お酢+鉄": { formula: "2CH₃COOH + Fe → (CH₃COO)₂Fe + H₂↑", bubbles: true, gas: "水素（H₂）", gasKey: "水素", smell: "すっぱいにおい", combustible: "hydrogen" },
    "お酢+アルミニウム": { formula: "6CH₃COOH + 2Al → 2(CH₃COO)₃Al + 3H₂↑", bubbles: true, gas: "水素（H₂）", gasKey: "水素", smell: "すっぱいにおい", combustible: "hydrogen" },

    "水酸化ナトリウム水溶液+アルミニウム": { formula: "2Al + 2NaOH + 2H₂O → 2NaAlO₂ + 3H₂↑", bubbles: true, gas: "水素（H₂）", gasKey: "水素", smell: "", combustible: "hydrogen" },

    "希塩酸+石灰石": { formula: "2HCl + CaCO₃ → CaCl₂ + H₂O + CO₂↑", bubbles: true, gas: "二酸化炭素（CO₂）", gasKey: "二酸化炭素", smell: "", combustible: "co2" },
    "希硫酸+石灰石": { formula: "H₂SO₄ + CaCO₃ → CaSO₄ + H₂O + CO₂↑", bubbles: true, gas: "二酸化炭素（CO₂）", gasKey: "二酸化炭素", smell: "", combustible: "co2" },
    "お酢+石灰石": { formula: "2CH₃COOH + CaCO₃ → (CH₃COO)₂Ca + H₂O + CO₂↑", bubbles: true, gas: "二酸化炭素（CO₂）", gasKey: "二酸化炭素", smell: "すっぱいにおい", combustible: "co2" },

    "希塩酸+水酸化ナトリウム": { formula: "HCl + NaOH → NaCl + H₂O（中和）", bubbles: false, gas: "", smell: "", combustible: "none", neutralize: true },
    "希塩酸+水酸化カルシウム": { formula: "2HCl + Ca(OH)₂ → CaCl₂ + 2H₂O（中和）", bubbles: false, gas: "", smell: "", combustible: "none", neutralize: true },
    "希硫酸+水酸化ナトリウム": { formula: "H₂SO₄ + 2NaOH → Na₂SO₄ + 2H₂O（中和）", bubbles: false, gas: "", smell: "", combustible: "none", neutralize: true },
    "希硫酸+水酸化カルシウム": { formula: "H₂SO₄ + Ca(OH)₂ → CaSO₄ + 2H₂O（中和）", bubbles: false, gas: "", smell: "", combustible: "none", neutralize: true },
    "お酢+水酸化ナトリウム": { formula: "CH₃COOH + NaOH → CH₃COONa + H₂O（中和）", bubbles: false, gas: "", smell: "", combustible: "none", neutralize: true },
    "お酢+水酸化カルシウム": { formula: "2CH₃COOH + Ca(OH)₂ → (CH₃COO)₂Ca + 2H₂O（中和）", bubbles: false, gas: "", smell: "", combustible: "none", neutralize: true },

    "過酸化水素水+二酸化マンガン": { formula: "2H₂O₂ → 2H₂O + O₂↑（MnO₂は触媒）", bubbles: true, gas: "酸素（O₂）", gasKey: "酸素", smell: "", combustible: "oxygen" },

    "水+食塩": { formula: "NaCl → 水にとける（化学反応ではなく溶解）", bubbles: false, gas: "", smell: "", combustible: "none" },
    "水+砂糖": { formula: "砂糖 → 水にとける（化学反応ではなく溶解）", bubbles: false, gas: "", smell: "", combustible: "none" },
    "水+水酸化ナトリウム": { formula: "NaOH → 水にとけてアルカリ性に（熱が出る）", bubbles: false, gas: "", smell: "", combustible: "none" },
    "水+水酸化カルシウム": { formula: "Ca(OH)₂ → 少し水にとけて石灰水になる", bubbles: false, gas: "", smell: "", combustible: "none" },

    "塩化水素": { formula: "HCl（気体）→ 水にとけると塩酸（酸性）", bubbles: false, gas: "塩化水素（HCl）", gasKey: "塩化水素", smell: "つんとくるにおい", combustible: "none" },
    "アンモニア": { formula: "NH₃（気体）→ 水にとけるとアンモニア水（アルカリ性）", bubbles: false, gas: "アンモニア（NH₃）", gasKey: "アンモニア", smell: "つんとくるにおい（独特）", combustible: "none" },
    "二酸化炭素": { formula: "CO₂（気体）→ 水にとけると炭酸水（酸性）", bubbles: false, gas: "二酸化炭素（CO₂）", gasKey: "二酸化炭素", smell: "においはない", combustible: "co2" },
    "酸素": { formula: "O₂（気体）→ ものを燃やすのを助ける", bubbles: false, gas: "酸素（O₂）", gasKey: "酸素", smell: "", combustible: "oxygen" },
    "水素": { formula: "H₂（気体）→ よく燃えて爆発する", bubbles: false, gas: "水素（H₂）", gasKey: "水素", smell: "においはない", combustible: "hydrogen" }
  };

  let currentLiquid = null;
  let selectedSolids = new Set();
  let selectedIndicator = null;
  let beakerBroken = false;
  let collectedGas = null; // 試験管に集めた気体のキー

  const liquidEl = document.getElementById('liquid');
  const solidsDisplayEl = document.getElementById('solidsDisplay');
  const bubblesEl = document.getElementById('bubbles');
  const paperEl = document.getElementById('paper');
  const labelEl = document.getElementById('label');
  const phEl = document.getElementById('phinfo');
  const recipeEl = document.getElementById('recipe');
  const gasProdEl = document.getElementById('gasProd');
  const reactionEl = document.getElementById('reaction');
  const smellEl = document.getElementById('smell');
  const hintEl = document.getElementById('hint');
  const beakerEl = document.getElementById('beaker');
  const explosionEl = document.getElementById('explosion');
  const collectBtn = document.getElementById('collectBtn');
  const tubeConnector = document.getElementById('tubeConnector');
  const testtubeArea = document.getElementById('testtubeArea');
  const gasFillEl = document.getElementById('gasFill');
  const limewaterFillEl = document.getElementById('limewaterFill');
  const tubeFlameEl = document.getElementById('tubeFlame');
  const tubeExtinguishEl = document.getElementById('tubeExtinguish');
  const testtubeLabelEl = document.getElementById('testtubeLabel');
  const tubeActions = document.getElementById('tubeActions');
  const tubeHint = document.getElementById('tubeHint');
  const testtubeEl = document.getElementById('testtube');

  Object.keys(LIQUIDS).forEach(name => {
    const b = document.createElement('button');
    b.textContent = name;
    b.onclick = () => selectLiquid(name, b);
    document.getElementById('liquids').appendChild(b);
  });
  Object.keys(SOLIDS).forEach(name => {
    const label = document.createElement('label');
    label.className = 'checkbox-btn';
    label.style.cursor = 'pointer';
    const input = document.createElement('input');
    input.type = 'checkbox';
    input.value = name;
    input.onchange = () => toggleSolid(name, input.checked);
    const span = document.createElement('span');
    span.textContent = name;
    label.appendChild(input);
    label.appendChild(span);
    document.getElementById('solids').appendChild(label);
  });
  Object.keys(INDICATORS).forEach(name => {
    const b = document.createElement('button');
    b.textContent = name;
    b.onclick = () => selectIndicator(name, b);
    document.getElementById('indicators').appendChild(b);
  });

  function selectLiquid(name, btn) {
    currentLiquid = name;
    beakerBroken = false;
    document.querySelectorAll('#liquids button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    selectedIndicator = null;
    document.querySelectorAll('#indicators button').forEach(b => b.classList.remove('active'));
    paperEl.classList.remove('show');
    beakerEl.classList.remove('broken');
    render();
  }
  function toggleSolid(name, checked) {
    if (checked) selectedSolids.add(name);
    else selectedSolids.delete(name);
    selectedIndicator = null;
    document.querySelectorAll('#indicators button').forEach(b => b.classList.remove('active'));
    paperEl.classList.remove('show');
    render();
  }
  function selectIndicator(name, btn) {
    if (!currentLiquid || beakerBroken) {
      hintEl.textContent = "先に液体をえらんでね。";
      return;
    }
    selectedIndicator = name;
    document.querySelectorAll('#indicators button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    render();
  }

  function findReaction() {
    if (currentLiquid && selectedSolids.size > 0) {
      for (let solid of selectedSolids) {
        const key = currentLiquid + "+" + solid;
        if (REACTIONS[key]) return REACTIONS[key];
      }
    }
    return null;
  }

  function isLimewater() {
    return currentLiquid === "水" && selectedSolids.has("水酸化カルシウム");
  }

  function updateSolidsDisplay() {
    solidsDisplayEl.innerHTML = '';
    selectedSolids.forEach(solid => {
      const data = SOLIDS[solid];
      const item = document.createElement('div');
      item.className = 'solid-item';
      item.innerHTML = SVG[data.svg];
      item.title = solid;
      solidsDisplayEl.appendChild(item);
      if (currentLiquid && data.soluble) {
        setTimeout(() => { item.classList.add('dissolving'); }, 600);
      }
    });
  }

  function updateBubbles(hasBubbles) {
    bubblesEl.innerHTML = '';
    if (hasBubbles) {
      for (let i = 0; i < 8; i++) {
        const bubble = document.createElement('div');
        bubble.className = 'bubble';
        bubblesEl.appendChild(bubble);
      }
    }
  }

  function calculateProperty() {
    if (!currentLiquid) return "neutral";
    const reaction = findReaction();
    if (reaction && reaction.neutralize) return "neutral";
    let acidScore = 0, baseScore = 0;
    if (LIQUIDS[currentLiquid].property === "acid") acidScore += 2;
    selectedSolids.forEach(solid => {
      const prop = SOLIDS[solid].property;
      if (prop === "acid" || prop === "acid_react") acidScore += 1;
      if (prop === "base") baseScore += 1;
    });
    if (acidScore > baseScore) return "acid";
    if (baseScore > acidScore) return "base";
    return "neutral";
  }

  // 現在発生中の気体キーを取得（試験管に集められる気体）
  function getCurrentGasKey() {
    const reaction = findReaction();
    if (reaction && reaction.gasKey) return reaction.gasKey;
    return null;
  }

  // ===== 気体を試験管に集める =====
  function collectGas() {
    const gasKey = getCurrentGasKey();
    if (!gasKey) return;

    collectedGas = gasKey;
    tubeConnector.classList.add('active');

    setTimeout(() => {
      tubeConnector.classList.remove('active');
      gasFillEl.classList.add('filled');
      gasFillEl.style.background = GASES[gasKey] ? GASES[gasKey].color : "rgba(200,200,200,0.1)";
      testtubeArea.classList.add('has-gas');
      testtubeLabelEl.textContent = gasKey + " を集めた";
      tubeActions.style.display = 'flex';
      tubeHint.style.display = 'none';
      hintEl.textContent = "試験管に" + gasKey + "を集めた。マッチで火をつけるか、石灰水に通してみよう。";
    }, 900);
  }

  // ===== マッチで試験管の気体をテスト =====
  function testCombustion() {
    if (!collectedGas) return;
    const data = GASES[collectedGas];
    const combustible = data ? data.combustible : "none";

    tubeFlameEl.classList.remove('burn', 'burn-big');
    tubeExtinguishEl.classList.remove('show');
    explosionEl.classList.remove('active');

    if (combustible === "hydrogen") {
      tubeFlameEl.classList.add('burn');
      setTimeout(() => {
        tubeFlameEl.classList.remove('burn');
        explosionEl.classList.add('active');
        testtubeEl.classList.add('broken');
        gasFillEl.classList.remove('filled');
        testtubeLabelEl.textContent = "ポン！と爆発した";
        hintEl.textContent = "ポンと音がして爆発した！水素はとても燃えやすい気体です。";
        collectedGas = null;
        tubeActions.style.display = 'none';
      }, 350);
    } else if (combustible === "oxygen") {
      tubeFlameEl.classList.add('burn');
      setTimeout(() => {
        tubeFlameEl.classList.remove('burn');
        tubeFlameEl.classList.add('burn-big');
        hintEl.textContent = "炎が大きく燃え上がった！酸素は燃焼を助ける気体です。";
      }, 400);
      setTimeout(() => { tubeFlameEl.classList.remove('burn-big'); }, 2400);
    } else if (combustible === "co2") {
      tubeFlameEl.classList.add('burn');
      setTimeout(() => {
        tubeFlameEl.classList.remove('burn');
        tubeExtinguishEl.classList.add('show');
        setTimeout(() => {
          hintEl.textContent = "炎が消えた！二酸化炭素は燃焼を消す気体です。";
        }, 500);
      }, 800);
    } else {
      tubeFlameEl.classList.add('burn');
      setTimeout(() => {
        tubeFlameEl.classList.remove('burn');
        hintEl.textContent = "炎は小さいまま。この気体は燃えません。";
      }, 1500);
    }
  }

  // ===== 石灰水に通す =====
  function testLimewater() {
    if (!collectedGas) return;
    limewaterFillEl.classList.add('show');

    if (collectedGas === "二酸化炭素") {
      setTimeout(() => {
        limewaterFillEl.classList.add('cloudy');
        testtubeLabelEl.textContent = "石灰水が白くにごった";
        hintEl.textContent = "石灰水が白くにごった！この気体は二酸化炭素です（CaCO₃が沈殿）。";
      }, 400);
    } else {
      testtubeLabelEl.textContent = "石灰水：変化なし";
      hintEl.textContent = "石灰水は変化しなかった。二酸化炭素ではないことが確認できた。";
    }
  }

  function resetTestTube() {
    collectedGas = null;
    gasFillEl.classList.remove('filled');
    limewaterFillEl.classList.remove('show', 'cloudy');
    tubeFlameEl.classList.remove('burn', 'burn-big');
    tubeExtinguishEl.classList.remove('show');
    explosionEl.classList.remove('active');
    testtubeEl.classList.remove('broken');
    testtubeArea.classList.remove('has-gas');
    testtubeLabelEl.textContent = "気体なし";
    tubeActions.style.display = 'none';
    tubeHint.style.display = 'block';
  }

  function render() {
    resetTestTube();

    if (!currentLiquid) {
      liquidEl.classList.remove('filled', 'cloudy');
      liquidEl.style.background = "rgba(220, 235, 245, 0.12)";
      updateSolidsDisplay();
      updateBubbles(false);
      paperEl.classList.remove('show');
      labelEl.textContent = "ビーカーが空です";
      phEl.textContent = ""; recipeEl.textContent = "";
      gasProdEl.textContent = ""; reactionEl.textContent = ""; smellEl.textContent = "";
      collectBtn.disabled = true;
      hintEl.textContent = "まず液体をえらんでね。";
      return;
    }

    const property = calculateProperty();
    const reaction = findReaction();
    liquidEl.classList.add('filled');
    liquidEl.classList.remove('cloudy');

    labelEl.textContent = isLimewater() ? "石灰水（水＋水酸化カルシウム）" : currentLiquid;

    let recipe = [];
    if (selectedSolids.size > 0) recipe.push([...selectedSolids].join("・"));
    recipeEl.textContent = recipe.length > 0 ? recipe.join(" + ") : "(シンプル)";

    updateSolidsDisplay();

    const gasKey = getCurrentGasKey();

    if (reaction && reaction.formula) {
      reactionEl.textContent = reaction.formula;
      gasProdEl.textContent = reaction.gas ? "→ " + reaction.gas + " が発生" : "";
      updateBubbles(reaction.bubbles);
      collectBtn.disabled = !gasKey;
    } else {
      reactionEl.textContent = "（この組み合わせの反応はまだ登録されていません）";
      gasProdEl.textContent = "";
      updateBubbles(false);
      collectBtn.disabled = !gasKey;
    }

    let smellText = "";
    if (LIQUIDS[currentLiquid].smell) smellText += LIQUIDS[currentLiquid].smell + " ";
    if (reaction && reaction.smell) smellText += reaction.smell;
    smellEl.textContent = smellText;

    if (property === "acid") phEl.textContent = "酸性";
    else if (property === "base") phEl.textContent = "アルカリ性";
    else phEl.textContent = "中性";

    if (!selectedIndicator) {
      liquidEl.style.background = "rgba(220, 235, 245, 0.12)";
      paperEl.classList.remove('show');
      hintEl.textContent = gasKey ? "気体を試験管に集めて調べてみよう。" : "指示薬で色を見てみよう。";
      return;
    }

    const ind = INDICATORS[selectedIndicator];
    if (selectedIndicator === "リトマス紙") {
      liquidEl.style.background = "rgba(220, 235, 245, 0.12)";
      paperEl.style.background = ind.colors[property];
      paperEl.classList.add('show');
      hintEl.textContent = "リトマス紙 → " + ind.desc[property];
    } else {
      liquidEl.style.background = ind.colors[property];
      paperEl.classList.remove('show');
      hintEl.textContent = selectedIndicator + " → " + ind.desc[property];
    }
  }

  document.getElementById('reset').onclick = () => {
    currentLiquid = null;
    selectedSolids.clear();
    selectedIndicator = null;
    beakerBroken = false;
    document.querySelectorAll('input[type="checkbox"]').forEach(c => c.checked = false);
    document.querySelectorAll('#liquids button, #indicators button').forEach(b => b.classList.remove('active'));
    liquidEl.classList.remove('filled', 'cloudy');
    liquidEl.style.background = "rgba(220, 235, 245, 0.12)";
    updateSolidsDisplay();
    updateBubbles(false);
    beakerEl.classList.remove('broken');
    paperEl.classList.remove('show');
    resetTestTube();
    labelEl.textContent = "ビーカーが空です";
    phEl.textContent = ""; recipeEl.textContent = "";
    gasProdEl.textContent = ""; reactionEl.textContent = ""; smellEl.textContent = "";
    collectBtn.disabled = true;
    hintEl.textContent = "まず液体をえらんでね。";
  };
</script>
</body>
</html>
