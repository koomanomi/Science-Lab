<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>じっけんラボ</title>
<style>
  :root {
    --bg: #fbf7f0;
    --panel: #ffffff;
    --ink: #243447;
    --line: #d9d2c5;
    --accent: #3a7ca5;
    --accent-ink: #fff;
    --muted: #7a8794;
    --chem: #d97706;
    --phys: #7c3aed;
    --earth: #0891b2;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: "Hiragino Maru Gothic ProN", "Yu Gothic", system-ui, sans-serif;
    background: var(--bg);
    color: var(--ink);
    padding: 20px;
    min-height: 100vh;
  }
  .wrap { max-width: 700px; margin: 0 auto; }
  
  header {
    text-align: center;
    margin-bottom: 28px;
  }
  h1 {
    font-size: clamp(1.8rem, 6vw, 2.6rem);
    letter-spacing: 0.05em;
    margin-bottom: 8px;
  }
  .tagline {
    color: var(--muted);
    font-size: 0.95rem;
    letter-spacing: 0.03em;
  }

  .screen {
    display: none;
  }
  .screen.active {
    display: block;
  }

  /* メニュー画面 */
  .category-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    margin-bottom: 20px;
  }
  .category-btn {
    aspect-ratio: 1;
    border: none;
    border-radius: 16px;
    font-size: 1.3rem;
    font-weight: 800;
    cursor: pointer;
    transition: all 0.2s ease;
    color: #fff;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 6px;
    box-shadow: 0 6px 20px rgba(0,0,0,0.1);
  }
  .category-btn:hover { transform: translateY(-4px); box-shadow: 0 10px 28px rgba(0,0,0,0.15); }
  .cat-chem { background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%); }
  .cat-phys { background: linear-gradient(135deg, #a855f7 0%, #7c3aed 100%); }
  .cat-earth { background: linear-gradient(135deg, #22d3ee 0%, #0891b2 100%); }
  .category-btn span { font-size: 0.7em; opacity: 0.95; }

  /* 実験選択画面 */
  .exp-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 20px;
  }
  .back-btn {
    background: var(--line);
    border: none;
    border-radius: 10px;
    width: 40px;
    height: 40px;
    cursor: pointer;
    font-size: 1.2rem;
    transition: all 0.15s ease;
  }
  .back-btn:hover { background: var(--accent); color: #fff; }
  .exp-header h2 {
    font-size: 1.5rem;
    flex: 1;
  }

  .exp-list {
    display: grid;
    grid-template-columns: 1fr;
    gap: 12px;
  }
  .exp-card {
    background: var(--panel);
    border: 2px solid var(--line);
    border-radius: 14px;
    padding: 18px;
    cursor: pointer;
    transition: all 0.2s ease;
    text-align: left;
  }
  .exp-card:hover {
    border-color: var(--accent);
    box-shadow: 0 6px 16px rgba(58, 124, 165, 0.12);
    transform: translateX(4px);
  }
  .exp-card .title {
    font-size: 1.1rem;
    font-weight: 700;
    margin-bottom: 4px;
  }
  .exp-card .desc {
    font-size: 0.85rem;
    color: var(--muted);
  }
</style>
</head>
<body>
<div class="wrap">
  <!-- メニュー画面 -->
  <div id="menu" class="screen active">
    <header>
      <h1>じっけんラボ</h1>
      <p class="tagline">化学と物理で、自由に実験しよう</p>
    </header>

    <div class="category-grid">
      <button class="category-btn cat-chem" onclick="selectCategory('chem')">
        <div>化学</div>
        <span>かがく</span>
      </button>
      <button class="category-btn cat-phys" onclick="selectCategory('phys')">
        <div>物理</div>
        <span>ぶつり</span>
      </button>
      <button class="category-btn cat-earth" onclick="selectCategory('earth')">
        <div>地学</div>
        <span>ちがく</span>
      </button>
    </div>
  </div>

  <!-- 実験選択画面 -->
  <div id="experiments" class="screen">
    <div class="exp-header">
      <button class="back-btn" onclick="goBack()">←</button>
      <h2 id="catTitle">カテゴリ</h2>
    </div>

    <div class="exp-list" id="expList"></div>
  </div>
</div>

<script>
  const EXPERIMENTS = {
    chem: {
      title: "化学",
      items: [
        {
          name: "水溶液と指示薬",
          desc: "酸性・中性・アルカリ性の水溶液に指示薬を入れて、色の変化を観察しよう。",
          file: "solution.html"
        },
        {
          name: "ものの溶け方（準備中）",
          desc: "水温と量を変えて、溶ける限界を試す。",
          file: null
        },
        {
          name: "中和実験（準備中）",
          desc: "酸とアルカリを混ぜると、どうなる？",
          file: null
        }
      ]
    },
    phys: {
      title: "物理",
      items: [
        {
          name: "電気回路",
          desc: "電池・豆電球・配線を自由につないで、直列・並列や電流の流れを観察しよう。",
          file: "circuit.html"
        },
        {
          name: "てこ・てんびん（準備中）",
          desc: "支点からの距離と重さで、釣り合いを試す。",
          file: null
        },
        {
          name: "滑車（準備中）",
          desc: "滑車の組み合わせで、力のはたらきを学ぶ。",
          file: null
        }
      ]
    },
    earth: {
      title: "地学",
      items: [
        {
          name: "月の満ち欠け",
          desc: "地球のまわりを回る月が、なぜ満ち欠けするのかを見て学ぼう。",
          file: "moon.html"
        },
        {
          name: "星の動き（準備中）",
          desc: "星座が季節や時刻でどう動くかを学ぶ。",
          file: null
        },
        {
          name: "太陽の動き（準備中）",
          desc: "季節による太陽の高さや日の出・日の入りを学ぶ。",
          file: null
        }
      ]
    }
  };

  function selectCategory(cat) {
    const data = EXPERIMENTS[cat];
    document.getElementById('catTitle').textContent = data.title;

    const list = document.getElementById('expList');
    list.innerHTML = '';

    data.items.forEach(exp => {
      const card = document.createElement('div');
      card.className = 'exp-card';
      card.innerHTML = `
        <div class="title">${exp.name}</div>
        <div class="desc">${exp.desc}</div>
      `;
      if (exp.file) {
        card.style.cursor = 'pointer';
        card.onclick = () => {
          window.location.href = exp.file;
        };
      } else {
        card.style.opacity = '0.6';
        card.style.cursor = 'not-allowed';
      }
      list.appendChild(card);
    });

    document.getElementById('menu').classList.remove('active');
    document.getElementById('experiments').classList.add('active');
  }

  function goBack() {
    document.getElementById('menu').classList.add('active');
    document.getElementById('experiments').classList.remove('active');
  }
</script>
</body>
</html>
