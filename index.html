<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>水溶液じっけんラボ</title>
<style>
  :root {
    --bg: #fbf7f0;
    --panel: #ffffff;
    --ink: #243447;
    --line: #d9d2c5;
    --accent: #3a7ca5;
    --accent-ink: #fff;
    --muted: #7a8794;
    --shelf: #efe7d8;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: "Hiragino Maru Gothic ProN", "Yu Gothic", system-ui, sans-serif;
    background: var(--bg);
    color: var(--ink);
    line-height: 1.6;
    padding: 16px;
  }
  .wrap { max-width: 820px; margin: 0 auto; }
  header { text-align: center; margin-bottom: 18px; }
  h1 { font-size: clamp(1.5rem, 5vw, 2.1rem); letter-spacing: 0.04em; }
  .sub { color: var(--muted); font-size: 0.9rem; margin-top: 4px; }

  .lab {
    display: grid;
    grid-template-columns: 1fr;
    gap: 16px;
  }
  @media (min-width: 720px) {
    .lab { grid-template-columns: 1fr 300px; }
  }

  .bench {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 18px;
    padding: 24px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  .beaker-area { position: relative; width: 180px; height: 200px; }
  .beaker {
    position: absolute; bottom: 0; left: 0;
    width: 180px; height: 180px;
    border: 4px solid #b9c2cb;
    border-top: none;
    border-radius: 0 0 22px 22px;
    overflow: hidden;
    background: rgba(255,255,255,0.4);
  }
  .liquid {
    position: absolute; bottom: 0; left: 0; right: 0;
    height: 62%;
    background: #d7ecf5;
    transition: background 0.6s ease;
  }
  .liquid::before {
    content: ""; position: absolute; top: -8px; left: 0; right: 0;
    height: 12px; border-radius: 50%;
    background: rgba(255,255,255,0.35);
  }
  .label {
    margin-top: 14px; font-weight: 700; font-size: 1.05rem;
    min-height: 1.6em; text-align: center;
  }
  .ph {
    margin-top: 2px; font-size: 0.85rem; color: var(--muted);
    min-height: 1.4em; text-align: center;
  }
  .paper {
    position: absolute; top: 10px; right: -8px;
    width: 26px; height: 80px; border-radius: 4px;
    background: #fff; border: 1px solid var(--line);
    transition: background 0.5s ease;
    display: none;
  }
  .paper.show { display: block; }

  .panel {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 18px;
    padding: 18px;
  }
  .panel h2 { font-size: 0.95rem; color: var(--muted); margin-bottom: 8px; letter-spacing: 0.05em; }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 18px; }
  .grid.three { grid-template-columns: 1fr 1fr 1fr; }
  button {
    font-family: inherit; font-size: 0.9rem; cursor: pointer;
    border: 1px solid var(--line); background: var(--shelf);
    color: var(--ink); border-radius: 12px; padding: 10px 6px;
    transition: all 0.15s ease; font-weight: 600;
  }
  button:hover { border-color: var(--accent); }
  button.active { background: var(--accent); color: var(--accent-ink); border-color: var(--accent); }
  .reset {
    width: 100%; background: transparent; border: 1px dashed var(--line);
    color: var(--muted); padding: 8px;
  }
  .hint {
    margin-top: 16px; font-size: 0.82rem; color: var(--muted);
    background: var(--bg); border-radius: 10px; padding: 10px 12px;
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>水溶液じっけんラボ</h1>
    <p class="sub">水溶液をえらんで、指示薬を入れて、色のへんかをかんさつしよう</p>
  </header>

  <div class="lab">
    <div class="bench">
      <div class="beaker-area">
        <div class="beaker">
          <div class="liquid" id="liquid"></div>
        </div>
        <div class="paper" id="paper"></div>
      </div>
      <div class="label" id="label">何も入っていません</div>
      <div class="ph" id="phinfo"></div>
    </div>

    <div class="panel">
      <h2>① 水溶液をえらぶ</h2>
      <div class="grid" id="solutions"></div>

      <h2>② 指示薬を入れる</h2>
      <div class="grid three" id="indicators"></div>

      <button class="reset" id="reset">ビーカーを空にする</button>

      <div class="hint" id="hint">まず水溶液をえらんでね。</div>
    </div>
  </div>
</div>

<script>
  const SOLUTIONS = {
    "うすい塩酸":      { type: "acid",    base: "#eef6fb", note: "強い酸性。鼻にツンとくるにおい。" },
    "炭酸水":          { type: "acid",    base: "#eef6fb", note: "弱い酸性。二酸化炭素がとけた水。" },
    "食塩水":          { type: "neutral", base: "#eef6fb", note: "中性。食塩（塩化ナトリウム）の水溶液。" },
    "さとう水":        { type: "neutral", base: "#eef6fb", note: "中性。電気を通さない非電解質。" },
    "石灰水":          { type: "base",    base: "#eef6fb", note: "弱いアルカリ性。二酸化炭素で白くにごる。" },
    "アンモニア水":    { type: "base",    base: "#eef6fb", note: "強いアルカリ性。鼻にツンとくるにおい。" },
    "水酸化ナトリウム水溶液": { type: "base", base: "#eef6fb", note: "強いアルカリ性。手につくとぬるぬるする。" },
    "水道水":          { type: "neutral", base: "#eef6fb", note: "ほぼ中性。" }
  };

  const INDICATORS = {
    "BTB液": {
      kind: "liquid",
      colors: { acid: "#f5d76e", neutral: "#7ec850", base: "#3b7fd4" },
      desc: { acid: "黄色になった", neutral: "緑色になった", base: "青色になった" }
    },
    "フェノールフタレイン": {
      kind: "liquid",
      colors: { acid: "#eef6fb", neutral: "#eef6fb", base: "#e85a9b" },
      desc: { acid: "むしょくのまま", neutral: "むしょくのまま", base: "赤むらさき色になった" }
    },
    "リトマス紙": {
      kind: "paper",
      colors: { acid: "#e8554e", neutral: "#cdb9a0", base: "#4a78c4" },
      desc: { acid: "青色リトマス紙が赤くなった", neutral: "色は変わらない", base: "赤色リトマス紙が青くなった" }
    }
  };

  const liquidEl = document.getElementById('liquid');
  const paperEl = document.getElementById('paper');
  const labelEl = document.getElementById('label');
  const phEl = document.getElementById('phinfo');
  const hintEl = document.getElementById('hint');
  const solBox = document.getElementById('solutions');
  const indBox = document.getElementById('indicators');

  let current = null;
  let indicator = null;

  Object.keys(SOLUTIONS).forEach(name => {
    const b = document.createElement('button');
    b.textContent = name;
    b.onclick = () => selectSolution(name, b);
    solBox.appendChild(b);
  });
  Object.keys(INDICATORS).forEach(name => {
    const b = document.createElement('button');
    b.textContent = name;
    b.onclick = () => selectIndicator(name, b);
    indBox.appendChild(b);
  });

  function clearActive(box) {
    [...box.children].forEach(c => c.classList.remove('active'));
  }

  function selectSolution(name, btn) {
    current = name;
    clearActive(solBox);
    btn.classList.add('active');
    indicator = null;
    clearActive(indBox);
    paperEl.classList.remove('show');
    render();
  }

  function selectIndicator(name, btn) {
    if (!current) { hintEl.textContent = "先に水溶液をえらんでね。"; return; }
    indicator = name;
    clearActive(indBox);
    btn.classList.add('active');
    render();
  }

  function render() {
    const sol = SOLUTIONS[current];
    labelEl.textContent = current;
    phEl.textContent = sol.note;

    if (!indicator) {
      liquidEl.style.background = sol.base;
      paperEl.classList.remove('show');
      hintEl.textContent = "指示薬を入れて、色のへんかを見てみよう。";
      return;
    }

    const ind = INDICATORS[indicator];
    const t = sol.type;

    if (ind.kind === "paper") {
      liquidEl.style.background = sol.base;
      paperEl.style.background = ind.colors[t];
      paperEl.classList.add('show');
      hintEl.textContent = current + " に " + indicator + " → " + ind.desc[t];
    } else {
      liquidEl.style.background = ind.colors[t];
      paperEl.classList.remove('show');
      hintEl.textContent = current + " に " + indicator + " → " + ind.desc[t];
    }
  }

  document.getElementById('reset').onclick = () => {
    current = null; indicator = null;
    clearActive(solBox); clearActive(indBox);
    liquidEl.style.background = "#d7ecf5";
    paperEl.classList.remove('show');
    labelEl.textContent = "何も入っていません";
    phEl.textContent = "";
    hintEl.textContent = "まず水溶液をえらんでね。";
  };
</script>
</body>
</html>
