<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>月の満ち欠けラボ</title>
<style>
  :root {
    --bg: #0a0e1a;
    --panel: #161b2e;
    --ink: #e8eaed;
    --line: #2a3148;
    --accent: #ffd166;
    --muted: #8893a8;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    font-family: "Hiragino Maru Gothic ProN", "Yu Gothic", system-ui, sans-serif;
    background: var(--bg);
    color: var(--ink);
    line-height: 1.6;
    display: flex;
    flex-direction: column;
  }
  header {
    display: flex; align-items: center; gap: 12px;
    padding: 16px; background: var(--panel);
    border-bottom: 1px solid var(--line); flex-shrink: 0;
  }
  .back-btn {
    background: var(--line); border: 1px solid var(--line);
    border-radius: 10px; width: 40px; height: 40px;
    cursor: pointer; font-size: 1.2rem; color: var(--ink);
    transition: all 0.15s ease; flex-shrink: 0;
  }
  .back-btn:hover { background: var(--accent); color: #000; }
  header h1 { font-size: 1.4rem; letter-spacing: 0.04em; flex: 1; }
  .sub { color: var(--muted); font-size: 0.75rem; }

  .content { flex: 1; overflow-y: auto; padding: 16px; }

  /* 宇宙ビュー */
  .space-view {
    position: relative;
    width: 100%;
    max-width: 360px;
    aspect-ratio: 1;
    margin: 0 auto 20px;
    background: radial-gradient(circle at 85% 50%, rgba(255,220,100,0.08), transparent 40%);
    border-radius: 16px;
  }
  /* 太陽 */
  .sun {
    position: absolute; top: 50%; right: 4px;
    transform: translateY(-50%);
    width: 38px; height: 38px; border-radius: 50%;
    background: radial-gradient(circle at 40% 40%, #fff5cc, #ffd166 50%, #ff9500);
    box-shadow: 0 0 24px rgba(255, 209, 102, 0.7), 0 0 48px rgba(255, 149, 0, 0.4);
    z-index: 3;
  }
  .sun-label {
    position: absolute; top: calc(50% + 24px); right: 4px;
    font-size: 0.65rem; color: var(--accent);
  }
  .sun-rays {
    position: absolute; top: 0; left: 0; right: 0; bottom: 0;
    pointer-events: none; z-index: 0;
  }
  /* 地球 */
  .earth {
    position: absolute; top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 36px; height: 36px; border-radius: 50%;
    background: radial-gradient(circle at 35% 35%, #6bb6ff, #2a6fc9 60%, #1a4480);
    box-shadow: 0 0 12px rgba(107, 182, 255, 0.5);
    z-index: 3;
  }
  .earth-label {
    position: absolute; top: calc(50% + 24px); left: 50%;
    transform: translateX(-50%);
    font-size: 0.65rem; color: #6bb6ff;
  }
  /* 公転軌道 */
  .orbit {
    position: absolute; top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    border: 1px dashed rgba(255,255,255,0.15);
    border-radius: 50%;
  }
  /* 月（12個） */
  .moon-pos {
    position: absolute;
    width: 30px; height: 30px;
    transform: translate(-50%, -50%);
    cursor: pointer;
    z-index: 2;
    transition: transform 0.2s ease;
  }
  .moon-pos:hover { transform: translate(-50%, -50%) scale(1.15); }
  .moon-pos.selected { z-index: 4; }
  .moon-pos.selected .moon-circle {
    box-shadow: 0 0 0 3px var(--accent), 0 0 12px var(--accent);
  }
  /* 月の本体（宇宙視点：右半分が太陽光で光る） */
  .moon-circle {
    width: 100%; height: 100%; border-radius: 50%;
    background: #333a4d;
    position: relative;
    overflow: hidden;
  }
  .moon-lit {
    position: absolute; top: 0; bottom: 0;
    background: #f0ead6;
  }

  /* 詳細パネル */
  .detail {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 16px;
    padding: 20px;
    text-align: center;
    max-width: 360px;
    margin: 0 auto 16px;
  }
  .detail h2 { font-size: 1.2rem; margin-bottom: 4px; color: var(--accent); }
  .detail .phase-sub { font-size: 0.75rem; color: var(--muted); margin-bottom: 16px; }

  /* 地球から見た月の形 */
  .earth-view {
    width: 90px; height: 90px;
    margin: 0 auto 14px;
  }
  .earth-view svg { width: 100%; height: 100%; display: block; }
  .detail-info { font-size: 0.8rem; color: var(--muted); line-height: 1.7; }
  .detail-info strong { color: var(--ink); }

  /* スライダー */
  .slider-panel {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 16px;
    padding: 16px 20px;
    max-width: 360px;
    margin: 0 auto 16px;
  }
  .slider-panel label { font-size: 0.8rem; color: var(--muted); display: block; margin-bottom: 10px; }
  input[type="range"] {
    width: 100%; accent-color: var(--accent); cursor: pointer;
  }
  .controls {
    display: flex; gap: 8px; margin-top: 12px;
  }
  .controls button {
    flex: 1;
    font-family: inherit; font-size: 0.8rem; cursor: pointer;
    border: 1px solid var(--line); background: var(--line);
    color: var(--ink); border-radius: 8px; padding: 8px;
    font-weight: 600; transition: all 0.15s ease;
  }
  .controls button:hover { border-color: var(--accent); }
  .controls button.playing { background: var(--accent); color: #000; }

  .hint {
    font-size: 0.7rem; color: var(--muted);
    text-align: center; max-width: 360px; margin: 0 auto;
    background: var(--panel); border-radius: 8px; padding: 10px;
  }
</style>
</head>
<body>
<header>
  <button class="back-btn" onclick="history.back()">←</button>
  <div>
    <h1>月の満ち欠けラボ</h1>
    <p class="sub">月をタップ、またはスライダーで動かそう</p>
  </div>
</header>

<div class="content">
  <div class="space-view" id="spaceView">
    <div class="orbit" id="orbit"></div>
    <div class="sun"></div>
    <div class="sun-label">太陽</div>
    <div class="earth"></div>
    <div class="earth-label">地球</div>
    <!-- 月はJSで配置 -->
  </div>

  <div class="detail">
    <h2 id="phaseName">満月</h2>
    <p class="phase-sub" id="phaseSub">地球から見た形</p>
    <div class="earth-view" id="earthView"></div>
    <div class="detail-info" id="detailInfo"></div>
  </div>

  <div class="slider-panel">
    <label>月の位置（公転）</label>
    <input type="range" id="slider" min="0" max="11" value="6" step="1">
    <div class="controls">
      <button id="playBtn" onclick="togglePlay()">▶ 自動で公転</button>
      <button onclick="resetView()">最初に戻る</button>
    </div>
  </div>

  <div class="hint">
    月は約29.5日かけて地球を1周し、満ち欠けをくりかえします。光っている部分は、いつも太陽のある側（右）です。
  </div>
</div>

<script>
  // 12の月相。frac = 光って見える割合(0〜1)、side = 光る側(right/left/full/none)
  const PHASES = [
    { name: "新月", sub: "しんげつ", frac: 0.0, side: "none",
      info: "太陽と同じ方向にあり、光った面が地球から見えません。日中に空にありますが、見えません。" },
    { name: "三日月", sub: "みかづき", frac: 0.12, side: "right",
      info: "新月の数日後。夕方の西の空に、右側が細く光って見えます。" },
    { name: "上弦前", sub: "じょうげんまえ", frac: 0.3, side: "right",
      info: "だんだん右側がふくらんでいきます。" },
    { name: "上弦の月", sub: "じょうげんのつき", frac: 0.5, side: "right",
      info: "右半分が光って見える半月。夕方に南の空、真夜中に西へしずみます。" },
    { name: "十日夜過ぎ", sub: "とおかんやすぎ", frac: 0.7, side: "right",
      info: "半月よりもふくらんだ形（じょうげんの月と満月の間）。" },
    { name: "十三夜", sub: "じゅうさんや", frac: 0.88, side: "right",
      info: "満月に近づき、ほぼ丸く見えます。" },
    { name: "満月", sub: "まんげつ", frac: 1.0, side: "full",
      info: "太陽と反対側にあり、光った面が全部見えます。夕方に東からのぼり、真夜中に南、明け方に西へ。" },
    { name: "十六夜", sub: "いざよい", frac: 0.88, side: "left",
      info: "満月の翌日。左側からわずかに欠けはじめます。" },
    { name: "下弦前", sub: "かげんまえ", frac: 0.7, side: "left",
      info: "左側が光り、だんだん欠けていきます。" },
    { name: "下弦の月", sub: "かげんのつき", frac: 0.5, side: "left",
      info: "左半分が光って見える半月。真夜中に東からのぼり、明け方に南の空。" },
    { name: "二十六夜", sub: "にじゅうろくや", frac: 0.3, side: "left",
      info: "明け方の東の空に、左側が細く光って見えます。" },
    { name: "新月前", sub: "しんげつまえ", frac: 0.12, side: "left",
      info: "新月にもどる直前。ほとんど見えません。" }
  ];

  const spaceView = document.getElementById('spaceView');
  const slider = document.getElementById('slider');
  const phaseName = document.getElementById('phaseName');
  const phaseSub = document.getElementById('phaseSub');
  const earthView = document.getElementById('earthView');
  const detailInfo = document.getElementById('detailInfo');
  const orbit = document.getElementById('orbit');
  const playBtn = document.getElementById('playBtn');

  let selected = 6; // 満月からスタート
  let playing = false;
  let playTimer = null;
  const moonEls = [];

  // 月を12カ所に配置
  function layoutMoons() {
    const size = spaceView.clientWidth;
    const cx = size / 2;
    const cy = size / 2;
    const radius = size * 0.30;

    // 軌道
    orbit.style.width = (radius * 2) + 'px';
    orbit.style.height = (radius * 2) + 'px';

    // 既存削除
    moonEls.forEach(m => m.remove());
    moonEls.length = 0;

    for (let i = 0; i < 12; i++) {
      // position 0 (新月) = 太陽側 = 右(0度)。反時計回りに配置
      const angle = (i / 12) * 2 * Math.PI; // 0 = 右
      const x = cx + radius * Math.cos(angle);
      const y = cy - radius * Math.sin(angle);

      const moon = document.createElement('div');
      moon.className = 'moon-pos';
      moon.style.left = x + 'px';
      moon.style.top = y + 'px';

      // 宇宙視点：月の右半分（太陽側）が光る
      const circle = document.createElement('div');
      circle.className = 'moon-circle';
      const lit = document.createElement('div');
      lit.className = 'moon-lit';
      // 太陽は右なので、月の右半分が常に光る
      lit.style.right = '0';
      lit.style.width = '50%';
      circle.appendChild(lit);
      moon.appendChild(circle);

      moon.onclick = () => selectMoon(i);
      spaceView.appendChild(moon);
      moonEls.push(moon);
    }
    updateSelection();
  }

  function selectMoon(i) {
    selected = i;
    slider.value = i;
    updateSelection();
  }

  function updateSelection() {
    moonEls.forEach((m, i) => {
      m.classList.toggle('selected', i === selected);
    });

    const phase = PHASES[selected];
    phaseName.textContent = phase.name;
    phaseSub.textContent = phase.sub;
    detailInfo.innerHTML = phase.info;

    // 地球から見た形を描画
    drawEarthView(phase);
  }

  // 地球から見た月の形をSVGで正確に描く
  function drawEarthView(phase) {
    const R = 45;        // 月の半径
    const cx = 50, cy = 50;
    const dark = "#1a1f33";
    const litColor = "#f4eed8";

    let svg = `<svg viewBox="0 0 100 100">`;
    // 背景の暗い円（影の部分）
    svg += `<circle cx="${cx}" cy="${cy}" r="${R}" fill="${dark}"/>`;

    if (phase.side === "full") {
      svg += `<circle cx="${cx}" cy="${cy}" r="${R}" fill="${litColor}"/>`;
    } else if (phase.side === "none") {
      // 新月：暗いまま（うっすら輪郭だけ）
      svg += `<circle cx="${cx}" cy="${cy}" r="${R}" fill="none" stroke="#2a3148" stroke-width="1"/>`;
    } else {
      // 三日月〜半月〜満月手前を、明暗境界線（楕円）で表現
      // frac: 0(新月)〜1(満月)。terminatorの楕円の横半径を計算
      const frac = phase.frac;
      // 境界線の楕円の x方向半径（0=半月で直線, 満月/新月に近づくと R）
      const rx = R * Math.abs(1 - 2 * frac);
      const lit = (phase.side === "right");
      // 光る部分のパスを作る
      // 外側の半円（光る側）と、内側の半楕円（境界）を組み合わせる
      let path = "";
      if (frac <= 0.5) {
        // 細い月（三日月など）：外円の片側 + 内側にへこむ楕円
        if (lit) {
          // 右側が光る
          path = `M ${cx} ${cy - R} A ${R} ${R} 0 0 1 ${cx} ${cy + R} A ${rx} ${R} 0 0 ${0} ${cx} ${cy - R} Z`;
        } else {
          // 左側が光る
          path = `M ${cx} ${cy - R} A ${R} ${R} 0 0 0 ${cx} ${cy + R} A ${rx} ${R} 0 0 ${1} ${cx} ${cy - R} Z`;
        }
      } else {
        // ふくらんだ月（半月〜満月手前）：外円の片側 + 反対へふくらむ楕円
        if (lit) {
          path = `M ${cx} ${cy - R} A ${R} ${R} 0 0 1 ${cx} ${cy + R} A ${rx} ${R} 0 0 ${1} ${cx} ${cy - R} Z`;
        } else {
          path = `M ${cx} ${cy - R} A ${R} ${R} 0 0 0 ${cx} ${cy + R} A ${rx} ${R} 0 0 ${0} ${cx} ${cy - R} Z`;
        }
      }
      svg += `<path d="${path}" fill="${litColor}"/>`;
    }
    svg += `</svg>`;
    earthView.innerHTML = svg;
  }

  slider.addEventListener('input', () => {
    selected = parseInt(slider.value);
    updateSelection();
  });

  function togglePlay() {
    playing = !playing;
    if (playing) {
      playBtn.textContent = "⏸ 停止";
      playBtn.classList.add('playing');
      playTimer = setInterval(() => {
        selected = (selected + 1) % 12;
        slider.value = selected;
        updateSelection();
      }, 800);
    } else {
      stopPlay();
    }
  }

  function stopPlay() {
    playing = false;
    playBtn.textContent = "▶ 自動で公転";
    playBtn.classList.remove('playing');
    if (playTimer) clearInterval(playTimer);
  }

  function resetView() {
    stopPlay();
    selected = 6;
    slider.value = 6;
    updateSelection();
  }

  window.addEventListener('resize', layoutMoons);
  layoutMoons();
</script>
</body>
</html>
